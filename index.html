<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Quiz App</h2>

    <div class="quiz-container">
        <h3 id="question"></h3>

        <div id="options"></div>

            <button id="nextBtn" onclick="nextQuestion()">
                Next
            </button>

            <h3 id="score"></h3>
            <h4 id="progress"></h4>

            <button onclick="restartQuiz()">
                Restart
            </button>

            <h3 id="result"></h3>
    </div>

<script>

    let quiz = [
        {
            question: "What does HTML stand for?",
            options: [
                "Hyper Text Markup Language",
                "Hyper Transfer Markup Language",
                "Home Tool Markup Language",
                "Hyper Text Machine Language"
            ],
            answer: "Hyper Text Markup Language"
        },
        {
            question: "Which language is used for styling web pages?",
            options: [
                "HTML",
                "Python",
                "CSS",
                "Java"
            ],
            answer: "CSS"
        },
        {
            question: "Which language is used to make web pages interactive?",
            options: [
                "CSS",
                "JavaScript",
                "HTML",
                "SQL"
            ],
            answer: "JavaScript"
        },
        {
            question: "Which HTML tag is used to create a hyperlink?",
            options: [
                "<link>",
                "<href>",
                "<a>",
                "<url>"
            ],
            answer: "<a>"
        },
        {
            question: "Which CSS property changes text color?",
            options: [
                "background-color",
                "font-style",
                "color",
                "text-align"
            ],
            answer: "color"
        },
        {
            question: "Which symbol is used for IDs in CSS?",
            options: [
                ".",
                "#",
                "*",
                "@"
            ],
            answer: "#"
        },
        {
            question: "Which method is used to select an element by ID in JavaScript?",
            options: [
                "getElementById()",
                "querySelectorAll()",
                "getElementsByClassName()",
                "selectById()"
            ],
            answer: "getElementById()"
        },
        {
            question: "Which company developed JavaScript?",
            options: [
                "Microsoft",
                "Google",
                "Netscape",
                "Apple"
            ],
            answer: "Netscape"
        },
        {
            question: "Which keyword is used to declare a variable in JavaScript?",
            options: [
                "var",
                "int",
                "string",
                "define"
            ],
            answer: "var"
        },
        {
            question: "Which array method adds an element to the end of an array?",
            options: [
                "pop()",
                "shift()",
                "push()",
                "unshift()"
            ],
            answer: "push()"
        }
    ];

    let currentQuestion = 0;
    let score = 0;
    let answered = false;

    function showQuestion() {
        answered = false;
        
        document.getElementById('progress').textContent = 
                    `Question ${currentQuestion + 1} of ${quiz.length}`;

        document.getElementById("question").textContent = 
            quiz[currentQuestion].question;
        
        let nextBtn = document.getElementById("nextBtn");
        if(currentQuestion === quiz.length - 1){
            nextBtn.textContent = "Submit";
        }
        else{
            nextBtn.textContent = "Next";
        }

        let optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';

        quiz[currentQuestion].options.forEach(option => {
            let button = document.createElement('button');
            button.textContent = option;
            optionsDiv.append(button)

            button.onclick = function() {
                console.log(option);
                if(answered){
                    return;
                }
                answered =true;
                document.querySelectorAll("#options button")
                    .forEach(btn => btn.disabled = true);

                if(option === quiz[currentQuestion].answer){
                    score ++;
                    button.classList.add("correct");
                    console.log("Correct");
                }
                else{
                    button.classList.add("wrong");

                    document.querySelectorAll("#options button").forEach(btn => {
                        if(btn.textContent === quiz[currentQuestion].answer){
                            btn.style.backgroundColor = 'green';
                        }
                    });
                    console.log("Wrong")
                }
                console.log(score);
            } 
        })
    }
    showQuestion();

    function nextQuestion() {

        if(!answered){
            alert("Please select an answer");
            return;
        }
        currentQuestion++;

        if(currentQuestion < quiz.length){
             showQuestion();
        }
        else{
            document.getElementById('question').textContent = "Quiz Finished";
            document.getElementById('options').innerHTML = '';
            document.getElementById('score').textContent = "Your Score:"  + score + '/' + quiz.length;
        }

        let percentage = (score / quiz.length) * 100;
        let result = '';

        if(percentage >= 80){
            result = "Excellent!";
        }
        else if(percentage >= 50){
            result = "Good Job!";
        }
        else{
            result = "Keep Practicing!";
        }

        document.getElementById("result").textContent = result;
    }

    function restartQuiz() {
        currentQuestion = 0;
        score = 0;
        answered = false;

        document.getElementById("score").textContent = '';
        document.getElementById('result').textContent = '';
        showQuestion();
    }
</script>
</body>
</html>
